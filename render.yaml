services:
  - type: web
    name: cross-border-finance-server
    runtime: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm build:render
    startCommand: pnpm start:render
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cross-border-finance-db
          property: connectionString
      - key: VITE_API_BASE_URL
        value: /api
      - key: AUTH_REQUIRE_TOKEN
        value: true
      - key: ALLOW_HEADER_ROLE
        value: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://jiayinz906-lang.github.io
      - key: PUBLIC_APP_URL
        value: https://jiayinz906-lang.github.io/cross-border-finance-mvp/
      - key: UPLOAD_MAX_MB
        value: 25
      - key: IMAGE_UPLOAD_MAX_MB
        value: 10
      - key: HEALTH_DB_TIMEOUT_MS
        value: 5000
      - key: SLOW_REQUEST_THRESHOLD_MS
        value: 2000
      - key: HTTP_REQUEST_TIMEOUT_MS
        value: 120000
      - key: WECOM_WEBHOOK_URL
        sync: false
      - key: DINGTALK_WEBHOOK_URL
        sync: false
      - key: DINGTALK_WEBHOOK_SECRET
        sync: false
      - key: DINGTALK_APP_KEY
        sync: false
      - key: DINGTALK_APP_SECRET
        sync: false
      - key: DINGTALK_ROBOT_CODE
        sync: false
      - key: AUTH_TOKEN_SECRET
        generateValue: true

databases:
  - name: cross-border-finance-db
    plan: free
