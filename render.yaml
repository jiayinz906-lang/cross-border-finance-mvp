services:
  - type: web
    name: cross-border-finance-server
    runtime: node
    plan: free
    buildCommand: export DATABASE_URL=file:./dev.db && export VITE_API_BASE_URL=/api && pnpm install --frozen-lockfile && pnpm build:render
    startCommand: pnpm start:render
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: file:./dev.db
