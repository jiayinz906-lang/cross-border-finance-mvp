name: Build finance app

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Verify operational stability helpers
        run: pnpm verify:operations

      - name: Build server
        run: pnpm --filter cross-border-finance-server build

      - name: Package server artifact
        run: |
          mkdir -p server-package
          cp -r server/dist server-package/dist
          cp server/package.json server-package/server-package.json
          cp package.json pnpm-lock.yaml pnpm-workspace.yaml Dockerfile render.yaml server-package/
          cp -r prisma server-package/prisma

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: cross-border-finance-server
          path: server-package

      - name: Build client
        run: pnpm --filter cross-border-finance-client build
        env:
          VITE_API_BASE_URL: https://cross-border-finance-server.onrender.com/api
          VITE_PUBLIC_APP_URL: https://jiayinz906-lang.github.io/cross-border-finance-mvp/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
