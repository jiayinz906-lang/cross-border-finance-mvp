name: xjd-finance-prod

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/migrations/20260720000100_baseline/migration.sql:/docker-entrypoint-initdb.d/001-baseline.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  migrate:
    build:
      context: .
      target: backend-runtime
    restart: "no"
    env_file:
      - .env.production
    command: ["./node_modules/.bin/prisma", "migrate", "deploy"]
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      target: backend-runtime
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 4000
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  nginx:
    build:
      context: .
      target: frontend-runtime
      args:
        VITE_API_BASE_URL: /api
        VITE_PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost/}
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
