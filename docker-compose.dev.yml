name: xjd-finance-dev

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "127.0.0.1:${POSTGRES_DEV_PORT:-54320}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./prisma/migrations/20260720000100_baseline/migration.sql:/docker-entrypoint-initdb.d/001-baseline.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  migrate:
    build:
      context: .
      target: development
    restart: "no"
    env_file:
      - .env.docker
    command: ["./node_modules/.bin/prisma", "migrate", "deploy"]
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      target: development
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: development
      PORT: 4000
    command: ["pnpm", "--filter", "cross-border-finance-server", "dev"]
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ./server/src:/app/server/src
      - ./server/assets:/app/server/assets:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: .
      target: development
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:4000/api
      VITE_PUBLIC_APP_URL: http://localhost:5173/
    command: ["pnpm", "--filter", "cross-border-finance-client", "exec", "vite", "--host", "0.0.0.0", "--port", "5173"]
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./client/src:/app/client/src
      - ./client/index.html:/app/client/index.html:ro
      - ./client/vite.config.ts:/app/client/vite.config.ts:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_dev_data:
